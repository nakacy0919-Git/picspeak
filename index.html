<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PicSpeak - Modern Speaking Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              backgroundImage: {
                'sns-gradient': 'linear-gradient(45deg, #c13584, #f56040, #fcaf45)',
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-gray-900 bg-white">

    <div id="orientation-lock" class="fixed inset-0 z-[9999] flex-col items-center justify-center bg-white/95 text-gray-900 hidden backdrop-blur-md">
        <svg class="w-20 h-20 animate-bounce mb-6 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
        <p class="text-2xl font-black tracking-wider text-center">HOLD YOUR DEVICE VERTICALLY<br>SNS Style! ❤️</p>
    </div>

    <div class="app-container">

        <div id="view-start" class="flex-1 flex flex-col justify-center items-center p-6 md:p-12 lg:p-20 text-center h-full z-10 relative fade-in">
            
            <button id="btn-open-settings" class="absolute top-6 right-6 text-gray-500 hover:text-gray-900 transition-colors bg-gray-100 p-3 rounded-full backdrop-blur-sm shadow-md border border-gray-200 sns-btn">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>

            <div id="settings-modal" class="absolute inset-0 z-50 bg-black/60 backdrop-blur-md flex flex-col items-center justify-center hidden">
                <div class="bg-white p-8 rounded-2xl shadow-2xl w-11/12 max-w-sm border border-gray-100">
                    <h3 class="text-2xl font-black mb-6 text-gray-900 text-center tracking-tight">Speaking Time ⏰</h3>
                    <div class="grid grid-cols-5 gap-2 mb-8">
                        <button class="time-btn sns-btn bg-gray-100 text-gray-700 border border-gray-200 py-3 transition-all" data-time="20">20s</button>
                        <button class="time-btn sns-btn bg-sns-gradient text-white shadow-lg py-3 transition-all selected-time-btn" data-time="30">30s</button>
                        <button class="time-btn sns-btn bg-gray-100 text-gray-700 border border-gray-200 py-3 transition-all" data-time="40">40s</button>
                        <button class="time-btn sns-btn bg-gray-100 text-gray-700 border border-gray-200 py-3 transition-all" data-time="50">50s</button>
                        <button class="time-btn sns-btn bg-gray-100 text-gray-700 border border-gray-200 py-3 transition-all" data-time="60">60s</button>
                    </div>
                    <button id="btn-close-settings" class="w-full sns-btn bg-gray-900 text-white font-black text-xl py-4 transition-all tracking-widest">
                        DONE!
                    </button>
                </div>
            </div>

            <div class="mb-8 md:mb-12 lg:mb-16 mt-10">
                <h1 class="clean-title text-[6rem] md:text-[8rem] lg:text-[11rem] mb-4 text-transparent bg-clip-text bg-sns-gradient">PicSpeak</h1>
                <p class="text-gray-900 text-xl md:text-3xl lg:text-4xl font-extrabold tracking-widest uppercase">Modern Speaking Battle</p>
                <div class="mt-3 inline-block bg-white/20 px-5 py-2 rounded-lg text-sm font-black text-gray-900 border-2 border-gray-200/50 backdrop-blur-md shadow-lg">Complete Edition</div>
            </div>
            
            <div class="sns-card p-6 md:p-10 lg:p-14 w-full max-w-md md:max-w-2xl lg:max-w-4xl overflow-hidden">
                
                <div class="mb-6 lg:mb-10">
                    <h2 class="text-sm md:text-lg lg:text-xl font-black text-gray-900 mb-3 lg:mb-5 uppercase tracking-wider">Target Level</h2>
                    <div class="grid grid-cols-3 gap-3 lg:gap-6">
                        <button class="level-btn sns-btn bg-sns-gradient text-white shadow-lg py-3 lg:py-5 lg:text-2xl transition-all selected-level-btn" data-level="elementary">小学生</button>
                        <button class="level-btn sns-btn bg-white border border-gray-200 text-gray-700 py-3 lg:py-5 lg:text-2xl transition-all" data-level="junior_high">中学生</button>
                        <button class="level-btn sns-btn bg-white border border-gray-200 text-gray-700 py-3 lg:py-5 lg:text-2xl transition-all" data-level="high_school">高校生</button>
                    </div>
                </div>

                <div class="mb-8 lg:mb-12">
                    <h2 class="text-sm md:text-lg lg:text-xl font-black text-gray-900 mb-3 lg:mb-5 uppercase tracking-wider">Players</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 lg:gap-6">
                        <button class="player-btn sns-btn bg-sns-gradient text-white shadow-lg py-3 lg:py-5 flex flex-col items-center justify-center transition-all selected-player-btn" data-players="1">
                            <span class="text-2xl lg:text-4xl mb-1">👤</span><span class="text-xs lg:text-lg font-bold">1 Player</span>
                        </button>
                        <button class="player-btn sns-btn bg-white border border-gray-200 text-gray-700 py-3 lg:py-5 flex flex-col items-center justify-center transition-all" data-players="2">
                            <span class="text-2xl lg:text-4xl mb-1 flex"><span class="-mr-2">👤</span><span>👤</span></span><span class="text-xs lg:text-lg font-bold">2 Players</span>
                        </button>
                        <button class="player-btn sns-btn bg-white border border-gray-200 text-gray-700 py-3 lg:py-5 flex flex-col items-center justify-center transition-all" data-players="3">
                            <span class="text-2xl lg:text-4xl mb-1 flex"><span class="-mr-2">👤</span><span class="-mr-2">👤</span><span>👤</span></span><span class="text-xs lg:text-lg font-bold">3 Players</span>
                        </button>
                        <button class="player-btn sns-btn bg-white border border-gray-200 text-gray-700 py-3 lg:py-5 flex flex-col items-center justify-center transition-all" data-players="4">
                            <span class="text-2xl lg:text-4xl mb-1 flex"><span class="-mr-3">👤</span><span class="-mr-3">👤</span><span class="-mr-3">👤</span><span>👤</span></span><span class="text-xs lg:text-lg font-bold">4 Players</span>
                        </button>
                    </div>
                </div>

                <button id="btn-start-game" class="w-full sns-btn bg-sns-gradient text-white font-black text-3xl md:text-5xl lg:text-5xl py-5 md:py-6 lg:py-8 transition-all tracking-widest uppercase drop-shadow-xl hover:shadow-sns-gradient/30">
                    PIC & SPEAK!
                </button>
            </div>
        </div>

        <div id="view-play" class="flex-1 flex flex-col hidden h-full bg-white z-10 relative">
            <div class="bg-white px-4 md:px-6 py-2 md:py-3 flex justify-between items-center shadow-lg z-10 shrink-0 border-b border-gray-100">
                <div id="btn-home-from-play" class="clean-title text-xl md:text-2xl tracking-tighter text-transparent bg-clip-text bg-sns-gradient cursor-pointer hover:opacity-80 transition-opacity" style="font-size: 2.2rem;" title="Return to Home">PicSpeak</div>
                <div id="turn-indicator" class="bg-gray-100 text-gray-700 px-4 py-1 rounded-full font-extrabold text-sm hidden md:block border border-gray-200">Player 1's Turn</div>
                <div class="flex items-center gap-2 md:gap-4 bg-gray-100 px-3 py-1 rounded-full border border-gray-200">
                    <span class="text-xs md:text-sm font-extrabold text-gray-500">Time</span>
                    <span id="timer-text" class="text-xl md:text-2xl font-black text-gray-900 w-10 md:w-12 text-right">30s</span>
                </div>
            </div>

            <div class="w-full bg-gray-100 h-1.5 md:h-2 shrink-0">
                <div id="timer-bar" class="h-full bg-sns-gradient w-full timer-transition"></div>
            </div>

            <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative bg-white">
                
                <div id="image-panel" class="relative w-full h-48 md:h-auto md:w-3/5 bg-white shrink-0 md:shrink overflow-hidden flex items-center justify-center border-r-2 border-gray-100 shadow-inner rounded-3xl md:m-4 md:shadow-lg">
                    <img id="prompt-image" src="" alt="Prompt" class="absolute inset-0 w-full h-full object-contain filter blur-md transition-all duration-500">
                    <div id="pin-container" class="absolute inset-0 pointer-events-none z-20 overflow-hidden"></div>
                    <div id="combo-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none hidden bg-black/50 backdrop-blur-sm z-30">
                        <div class="text-center" id="combo-content"></div>
                    </div>
                    <div id="perfect-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none hidden bg-white/70 backdrop-blur-md z-40">
                        <div class="text-center" id="perfect-content"></div>
                    </div>
                </div>

                <div id="resizer" class="h-6 bg-gray-100 flex flex-col items-center justify-center cursor-ns-resize md:hidden shrink-0 touch-none w-full shadow-inner z-20 border-y border-gray-200">
                    <div class="w-16 h-1 bg-gray-300 rounded-full mb-0.5"></div>
                    <div class="w-16 h-1 bg-gray-300 rounded-full"></div>
                </div>

                <div class="flex-1 md:w-2/5 flex flex-col overflow-hidden bg-white">
                    <div class="flex-1 p-3 md:p-6 flex flex-col overflow-hidden relative bg-white">
                        <div class="flex justify-between items-end mb-2 md:mb-4 shrink-0">
                            <div class="text-xs md:text-sm font-extrabold text-gray-400 uppercase tracking-widest">Transcript:</div>
                            <div id="current-level-badge" class="text-[10px] md:text-xs font-extrabold text-gray-700 bg-gray-100 px-3 py-1 rounded-full border border-gray-200 shadow-sm">小学生レベル</div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 md:gap-3 mb-2 md:mb-4 shrink-0">
                            <div class="bg-white rounded-2xl p-2 md:p-3 shadow-sm border border-gray-100 flex flex-col justify-center items-center relative overflow-hidden">
                                <span class="text-[10px] md:text-xs font-extrabold text-gray-400 uppercase tracking-wider relative z-10">Words</span>
                                <span id="wordCountDisplay" class="text-xl md:text-4xl font-black text-gray-900 relative z-10">0</span>
                            </div>
                            <div class="bg-white rounded-2xl p-2 md:p-3 shadow-sm border border-gray-100 flex flex-col justify-center items-center relative overflow-hidden">
                                <span class="text-[10px] md:text-xs font-extrabold text-gray-400 uppercase tracking-wider relative z-10">Score</span>
                                <span id="scoreDisplay" class="text-xl md:text-4xl font-black text-gray-900 relative z-10">0</span>
                            </div>
                        </div>
                        
                        <div class="flex-1 bg-white border border-gray-100 rounded-xl p-4 md:p-6 overflow-y-auto shadow-inner text-base md:text-2xl leading-relaxed relative font-medium text-gray-800" id="transcript-box">
                            <p id="transcript-text" class="text-gray-400 italic font-bold">Press START and speak loudly. ❤️📍🏙️✨</p>
                        </div>
                    </div>

                    <div class="p-3 md:p-6 bg-white border-t border-gray-100 shrink-0">
                        <div class="flex justify-center mb-1 md:mb-3 h-4 md:h-6">
                            <span id="status-text" class="text-xs md:text-sm font-extrabold text-gray-400 uppercase tracking-wider">Ready</span>
                        </div>
                        <button id="btn-start-turn" class="w-full sns-btn bg-sns-gradient text-white font-black text-xl md:text-3xl py-3 md:py-5 transition-all flex items-center justify-center gap-2 tracking-widest uppercase shadow-md">
                            <span class="text-2xl md:text-4xl">🎙️</span> START
                        </button>
                        <div id="recording-indicator" class="hidden w-full sns-btn bg-gray-100 text-gray-700 font-black text-xl md:text-3xl py-3 md:py-5 rounded-lg border border-gray-200 flex items-center justify-center gap-2 recording-pulse cursor-pointer shadow-inner">
                            <span class="text-2xl md:text-4xl">🎤</span> LISTENING
                        </div>
                        <button id="btn-finish-turn" class="w-full sns-btn bg-gray-800 text-white font-black text-xl md:text-3xl py-3 md:py-5 transition-all hidden flex items-center justify-center gap-2 tracking-widest uppercase">
                            <span class="text-2xl md:text-4xl">🏁</span> FINISH
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <div id="view-result" class="flex-1 flex flex-col hidden h-full bg-white overflow-y-auto z-10 relative">
            <div class="bg-white text-center py-10 shadow-md shrink-0 border-b border-gray-100">
                <h2 class="text-5xl md:text-6xl font-black mb-2 drop-shadow-md text-transparent bg-clip-text bg-sns-gradient tracking-tighter" style="font-size: 6rem;">RESULTS</h2>
                <p class="text-gray-500 font-extrabold text-xl uppercase tracking-widest">Score & Feedback</p>
            </div>
            
            <div class="w-full max-w-4xl mx-auto flex-1 flex flex-col gap-6 p-6" id="ranking-container">
            </div>
            
            <div class="w-full max-w-4xl mx-auto p-6 bg-transparent shrink-0 pb-10 z-10">
                <button id="btn-play-again" class="w-full sns-btn bg-sns-gradient hover:bg-sns-gradient/90 text-white font-black text-3xl py-6 rounded-lg shadow-lg shadow-sns-gradient/30 active:translate-y-[2px] transition-all flex items-center justify-center gap-2 tracking-widest uppercase drop-shadow-lg">
                    PLAY AGAIN ❤️📍🏙️✨
                </button>
            </div>
        </div>

    </div>

    <script src="js/speech.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
