<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pic Flash - PicSpeak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fdf2f8; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }
        
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        @keyframes practiceSuccess {
            0% { transform: scale(0.5) translateY(20px); opacity: 0; }
            20% { transform: scale(1.5) translateY(-20px); opacity: 1; }
            80% { transform: scale(1.5) translateY(-20px); opacity: 1; }
            100% { transform: scale(1) translateY(-40px); opacity: 0; }
        }
        .animate-practice-success { animation: practiceSuccess 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .card-level-1 { border-color: #86efac !important; box-shadow: 0 0 20px rgba(134, 239, 172, 0.3); }
        .card-level-2 { border-color: #93c5fd !important; box-shadow: 0 0 20px rgba(147, 197, 253, 0.3); }
        .card-level-3 { border-color: #d8b4fe !important; box-shadow: 0 0 20px rgba(216, 180, 254, 0.3); }
    </style>
</head>
<body class="bg-pink-50 text-gray-800 overflow-x-hidden w-full h-full relative selection:bg-pink-200">

    <div class="app-container w-full min-h-screen relative flex flex-col max-w-7xl mx-auto bg-white/80 backdrop-blur-sm shadow-2xl">
        
        <!-- ========================================== -->
        <!-- ★ トップ画面 -->
        <!-- ========================================== -->
        <div id="view-picflash-select" class="flex flex-col items-center justify-start min-h-[80vh] w-full px-4 md:px-8 pt-8 pb-20 relative max-w-5xl mx-auto">
            <div class="w-full flex items-center justify-between mb-10">
                <button onclick="window.location.href='index.html'" class="w-12 h-12 md:w-16 md:h-16 bg-white rounded-full flex items-center justify-center text-2xl md:text-3xl shadow-sm border border-gray-200 hover:bg-pink-50 hover:text-pink-500 transition-colors">◀</button>
                <h2 class="text-3xl md:text-4xl lg:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 tracking-widest italic">⚡️ PIC FLASH</h2>
                <div class="w-12 md:w-16"></div>
            </div>

            <div class="w-full mb-3 pl-2"><h3 class="text-base md:text-lg lg:text-xl font-black text-gray-600 uppercase tracking-widest">1. モードを選ぶ</h3></div>
            <div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <button class="pf-mode-btn bg-white border-4 border-transparent hover:border-pink-300 text-gray-700 py-6 md:py-8 rounded-3xl flex flex-col items-center justify-center transition-all shadow-sm group" data-mode="practice">
                    <span class="text-4xl md:text-5xl mb-2 group-hover:scale-110 transition-transform">📖</span>
                    <span class="text-xl md:text-2xl lg:text-3xl font-black tracking-wider">学習モード</span>
                    <span class="text-sm md:text-base font-bold text-gray-500 mt-2">発音と意味をじっくり確認</span>
                </button>
                <button class="pf-mode-btn bg-white border-4 border-transparent hover:border-pink-300 text-gray-700 py-6 md:py-8 rounded-3xl flex flex-col items-center justify-center transition-all shadow-sm group" data-mode="trial">
                    <span class="text-4xl md:text-5xl mb-2 group-hover:scale-110 transition-transform">⏱️</span>
                    <span class="text-xl md:text-2xl lg:text-3xl font-black tracking-wider">タイムアタック</span>
                    <span class="text-sm md:text-base font-bold text-gray-500 mt-2">声に出して最速クリアを目指せ</span>
                </button>
            </div>

            <!-- ★ 新規追加: レベルを選ぶ (タイムアタック時のみ表示) -->
            <div id="section-level-select" class="hidden w-full transition-all duration-300">
                <div class="w-full mb-3 pl-2"><h3 class="text-base md:text-lg lg:text-xl font-black text-gray-600 uppercase tracking-widest">2. 出題レベルを選ぶ</h3></div>
                <div class="w-full bg-white p-3 md:p-4 rounded-3xl shadow-sm border border-gray-200 mb-8 grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-4">
                    <button class="pf-level-btn py-3 md:py-4 rounded-2xl font-black text-sm md:text-base transition-all bg-gray-50 text-gray-400 border-2 border-transparent" data-level="1">Level 1</button>
                    <button class="pf-level-btn py-3 md:py-4 rounded-2xl font-black text-sm md:text-base transition-all bg-gray-50 text-gray-400 border-2 border-transparent" data-level="2">Level 2</button>
                    <button class="pf-level-btn py-3 md:py-4 rounded-2xl font-black text-sm md:text-base transition-all bg-gray-50 text-gray-400 border-2 border-transparent" data-level="3">Level 3</button>
                    <button class="pf-level-btn py-3 md:py-4 rounded-2xl font-black text-sm md:text-base transition-all bg-gradient-to-br from-pink-400 to-rose-400 text-white shadow-md transform scale-105" data-level="all">All Levels</button>
                </div>
            </div>

            <!-- ★ 変更: セット数を 5, 10, 20, ALL に -->
            <div id="section-count-select" class="hidden w-full transition-all duration-300">
                <div class="w-full mb-3 pl-2"><h3 class="text-base md:text-lg lg:text-xl font-black text-gray-600 uppercase tracking-widest">3. 問題数を選ぶ</h3></div>
                <div class="w-full bg-white p-3 md:p-4 rounded-3xl shadow-sm border border-gray-200 mb-8 flex gap-2 md:gap-4">
                    <button class="pf-count-btn flex-1 py-4 md:py-5 rounded-2xl font-black text-lg md:text-xl transition-all bg-gradient-to-br from-pink-400 to-rose-400 text-white shadow-md transform scale-105" data-count="5">5</button>
                    <button class="pf-count-btn flex-1 py-4 md:py-5 rounded-2xl font-black text-lg md:text-xl transition-all bg-gray-50 text-gray-400 border-2 border-transparent" data-count="10">10</button>
                    <button class="pf-count-btn flex-1 py-4 md:py-5 rounded-2xl font-black text-lg md:text-xl transition-all bg-gray-50 text-gray-400 border-2 border-transparent" data-count="20">20</button>
                    <button class="pf-count-btn flex-1 py-4 md:py-5 rounded-2xl font-black text-lg md:text-xl transition-all bg-gray-50 text-gray-400 border-2 border-transparent" data-count="ALL">ALL</button>
                </div>
            </div>

            <div class="w-full mb-3 pl-2"><h3 id="title-category-select" class="text-base md:text-lg lg:text-xl font-black text-gray-600 uppercase tracking-widest">2. ジャンルを選ぶ</h3></div>
            <div id="pf-category-grid" class="w-full grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-12"></div>

            <!-- ★ 初期状態はグレーで押せないように変更 -->
            <button id="btn-pf-start" disabled class="w-full max-w-lg py-6 md:py-8 rounded-[2rem] bg-gray-300 text-white font-black text-3xl md:text-4xl shadow-none transition-all tracking-widest cursor-not-allowed">
                START 🚀
            </button>
        </div>

        <!-- ========================================== -->
        <!-- ★ 学習モード（グリッド一覧） -->
        <!-- ========================================== -->
        <div id="view-picflash-practice" class="hidden flex flex-col items-center justify-start min-h-screen w-full px-4 md:px-8 pt-8 pb-20 relative max-w-6xl mx-auto">
            <div class="w-full flex items-center justify-between mb-8">
                <button onclick="showPfView('view-picflash-select')" class="w-12 h-12 md:w-16 md:h-16 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">✖</button>
                <h2 class="text-2xl md:text-3xl lg:text-4xl font-black text-gray-700 tracking-widest">📖 学習モード (一覧)</h2>
                <div class="w-12 md:w-16"></div>
            </div>
            
            <div id="pf-practice-grid" class="w-full grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 pb-10">
                <!-- JSでカード一覧（格子状）を生成 -->
            </div>
        </div>

        <!-- ========================================== -->
        <!-- ★ タイムアタック画面 -->
        <!-- ========================================== -->
        <div id="view-picflash-play" class="hidden flex flex-col items-center justify-start min-h-screen w-full px-4 md:px-8 pt-6 pb-10 relative max-w-5xl mx-auto">
            <div class="w-full flex items-center justify-between bg-white px-6 md:px-10 py-4 md:py-6 rounded-full shadow-sm mb-6 border border-gray-200">
                <div class="font-black text-gray-400 text-xl md:text-2xl lg:text-3xl tracking-widest"><span id="pf-card-count" class="text-gray-700">1</span> / <span id="pf-total-count">10</span></div>
                <div class="font-black text-4xl md:text-5xl lg:text-6xl text-gray-800 tabular-nums"><span id="pf-timer">00.00</span><span class="text-xl md:text-2xl text-gray-400 ml-2">s</span></div>
                <button id="btn-pf-quit" class="w-12 h-12 md:w-16 md:h-16 bg-gray-100 rounded-full flex items-center justify-center font-black text-gray-500 hover:bg-red-50 hover:text-red-500 text-xl transition-colors">✖</button>
            </div>

            <div id="pf-level-badge" class="px-6 py-2 md:px-8 md:py-3 rounded-full font-black text-white text-base md:text-xl tracking-widest mb-4 bg-green-400 shadow-md transition-colors duration-300">
                🟩 LEVEL 1 (Base)
            </div>

            <div class="relative w-full aspect-video md:aspect-[4/3] bg-gray-100 rounded-[2rem] shadow-xl border-8 overflow-hidden mb-6 transform transition-all duration-300 card-level-1" id="pf-card">
                <img id="pf-image" src="" class="absolute inset-0 w-full h-full object-contain p-2 md:p-4">
                <div id="pf-overlay-correct" class="hidden absolute inset-0 bg-white/50 backdrop-blur-sm flex items-center justify-center z-10"><span class="text-9xl md:text-[12rem] transform scale-150 animate-pop">⭕️</span></div>
                <div id="pf-overlay-skip" class="hidden absolute inset-0 bg-red-500/20 backdrop-blur-sm flex flex-col items-center justify-center z-10"><span class="text-8xl md:text-9xl transform animate-pop mb-4">⏭️</span><span class="font-black text-4xl md:text-5xl text-white drop-shadow-lg text-red-500 tracking-widest">SKIP</span></div>
            </div>

            <div class="w-full bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-200 mb-8 text-center min-h-[100px] flex flex-col justify-center">
                <div class="text-sm md:text-base font-bold text-gray-400 mb-2">💡 HINT</div>
                <div id="pf-hint-text" class="text-2xl md:text-3xl lg:text-4xl font-black text-gray-700 leading-tight"></div>
            </div>

            <div class="flex flex-col items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="relative flex h-10 w-10 md:h-12 md:w-12"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75"></span><span class="relative inline-flex rounded-full h-full w-full bg-pink-500 items-center justify-center text-white text-lg md:text-xl">🎙</span></div>
                    <span class="font-black text-gray-500 tracking-widest text-xl md:text-2xl" id="pf-status-text">Listening...</span>
                </div>
                <!-- ★ 新規追加: スキップの説明書き -->
                <div class="text-sm md:text-base font-bold text-pink-400 mb-2">💡 わからない時は「Skip」と言うとパスできます（+2秒ペナルティ）</div>
                
                <button id="btn-pf-skip" class="px-10 py-4 md:px-12 md:py-5 bg-white text-gray-600 font-black text-xl md:text-2xl rounded-full shadow-sm hover:bg-gray-50 transition-colors border border-gray-200">Skip ⏭️</button>
            </div>
        </div>
        <!-- ========================================== -->
        <!-- ★ 結果画面 (履歴付き) -->
        <!-- ========================================== -->
        <div id="view-picflash-result" class="hidden flex flex-col items-center justify-center min-h-screen w-full px-4 pt-10 pb-20 relative max-w-4xl mx-auto">
            <h2 class="text-3xl md:text-4xl lg:text-5xl font-black text-gray-400 tracking-widest uppercase mb-6">Result</h2>
            
            <!-- ★ 自己ベスト更新バッジ（初期は非表示） -->
            <div id="pf-pb-badge" class="hidden absolute top-20 md:top-24 bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-500 text-yellow-900 font-black px-8 py-2 md:py-3 rounded-full shadow-[0_0_20px_rgba(250,204,21,0.8)] border-4 border-yellow-100 transform -rotate-2 animate-bounce z-20 text-xl md:text-3xl tracking-widest">
                🎉 自己ベスト更新！ 🎉
            </div>

            <!-- ★ ID pf-result-box を追加し、JSで色を変えられるように -->
            <div id="pf-result-box" class="w-full bg-gradient-to-br from-pink-500 to-rose-400 rounded-[3rem] p-8 md:p-12 flex flex-col items-center shadow-xl text-white mb-8 relative overflow-hidden transition-colors duration-500">
                <span class="text-white/90 font-extrabold text-lg md:text-xl tracking-widest mb-2 uppercase">クリアタイム</span>
                <div class="flex items-baseline gap-2"><span class="text-7xl md:text-[7rem] lg:text-[8rem] font-black leading-none" id="pf-final-time">00.00</span><span class="text-3xl md:text-4xl font-bold">s</span></div>
            </div>
            
            <!-- 履歴表示エリア -->
            <div class="w-full bg-white rounded-3xl p-6 shadow-sm border border-gray-200 mb-8 max-w-2xl">
                <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-4 border-b border-gray-100 pb-2 flex items-center justify-between">
                    <span>⏱️ あなたの記録 (直近)</span>
                </h3>
                <div id="pf-history-list" class="flex flex-col gap-1 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                    <!-- JSで生成 -->
                </div>
            </div>

            <button onclick="showPfView('view-picflash-select')" class="w-full max-w-md py-5 md:py-6 rounded-3xl bg-white text-gray-700 font-black text-xl md:text-2xl shadow-sm border border-gray-200 hover:bg-gray-50 transition-colors">トップに戻る</button>
        </div>

   <!-- ========================================== -->
    <!-- ★ 学習モード用 ポップアップモーダル -->
    <!-- ========================================== -->
    <!-- 余分な上部余白(pt-10など)をすべて削除し、一番上に配置 -->
    <div id="pf-practice-modal" class="hidden fixed inset-0 z-[100] flex items-start justify-center bg-gray-900/60 backdrop-blur-sm p-2 md:p-6 overflow-y-auto custom-scrollbar">
        
        <!-- 下に押し下げる原因だった「mt-auto」を削除し、「mt-0」で一番上に張り付かせる -->
        <div class="bg-white rounded-[2rem] w-full max-w-5xl relative shadow-2xl p-6 md:p-8 border border-gray-100 transform transition-all mt-0 mb-10">
            <button onclick="closePracticeModal()" class="absolute top-4 right-4 md:top-6 md:right-6 w-10 h-10 md:w-12 md:h-12 bg-gray-100 rounded-full flex items-center justify-center font-black text-gray-500 hover:bg-pink-100 hover:text-pink-500 transition-colors z-[110] text-xl shadow-sm">✖</button>
            
            <div id="pf-practice-modal-content" class="w-full mt-6 md:mt-2">
                <!-- JSで生成 -->
            </div>

            <!-- 派手な正解アニメーション用 -->
            <div id="pf-practice-success-anim" class="hidden absolute inset-0 pointer-events-none flex items-center justify-center z-[120]">
                <span class="text-[10rem] md:text-[15rem] drop-shadow-2xl">🌟✨</span>
            </div>
        </div>
    </div>
    <script src="js/picflash.js"></script>
</body>
</html>
