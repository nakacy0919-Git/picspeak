<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PicSpeak Story - 英語スピーキング練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', 'Noto Sans JP', sans-serif; 
            overscroll-behavior-y: none; 
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-white shadow-sm py-3 px-4 md:px-8 flex items-center justify-between shrink-0 z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
            <span class="text-2xl md:text-3xl font-black text-pink-500 tracking-tight">Pic<span class="text-yellow-400">Speak</span> <span class="text-blue-500">Story</span></span>
        </div>
        <button onclick="location.href='index.html'" class="text-sm font-bold text-gray-500 hover:text-gray-800 transition-colors bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-xl">
            ◀ HOMEへ戻る
        </button>
    </header>

    <main class="flex-1 overflow-hidden relative w-full h-full flex flex-col bg-gray-100">
        
        <div id="view-select" class="hidden flex-col h-full w-full p-4 md:p-8 overflow-y-auto max-w-6xl mx-auto">
            <h2 class="text-2xl md:text-3xl font-black text-gray-800 mb-6 text-center">ストーリーを選ぶ</h2>
            <div id="story-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 pb-20"></div>
        </div>

        <div id="view-reading" class="hidden flex-col h-full w-full relative">
            
            <div class="flex justify-between items-center p-3 md:px-6 bg-white shadow-sm shrink-0 z-10 border-b border-gray-200">
                <div id="reading-scene-badge" class="font-bold text-gray-700 text-sm md:text-lg flex items-center gap-2"></div>
                <div class="flex items-center gap-3 text-sm font-bold text-gray-600 bg-gray-50 px-4 py-1.5 rounded-full border border-gray-200">
                    <span class="text-xs">A</span>
                    <input type="range" id="font-size-slider" min="14" max="40" value="20" class="w-24 md:w-32 accent-blue-500">
                    <span class="text-lg">A</span>
                </div>
            </div>

            <div class="flex flex-col md:flex-row flex-1 overflow-hidden p-2 md:p-4 gap-1 md:gap-2" id="reading-panes-container">
                
                <div id="pane-image" class="flex flex-col relative shrink-0 bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden" style="flex-basis: 40%;">
                    <img id="reading-image" src="" class="w-full h-full object-contain bg-gray-50 p-2">
                </div>
                
                <div id="resizer-1" class="flex justify-center items-center shrink-0 cursor-row-resize md:cursor-col-resize group w-full h-4 md:w-4 md:h-full z-10">
                    <div class="w-12 h-1.5 md:w-1.5 md:h-12 bg-gray-300 rounded-full group-hover:bg-blue-400 transition-colors"></div>
                </div>

                <div id="right-container" class="flex flex-col flex-1 overflow-hidden shrink-0 gap-1 md:gap-2">
                    
                    <div id="pane-text" class="flex flex-col bg-white p-5 md:p-8 shrink-0 rounded-3xl shadow-sm border border-gray-200 relative" style="flex-basis: 50%;">
                        <div class="absolute top-3 left-5 text-xs font-black text-gray-400 uppercase tracking-widest">Story Text</div>
                        <div class="flex-1 overflow-y-auto mt-4">
                            <div id="reading-text-content" class="font-medium leading-relaxed text-gray-800 transition-all" style="font-size: 20px;"></div>
                            <div id="reading-text-ja" class="text-sm text-gray-500 mt-6 hidden border-t border-dashed border-gray-300 pt-4"></div>
                        </div>
                    </div>

                    <div id="resizer-2" class="h-4 w-full cursor-row-resize flex justify-center items-center shrink-0 group z-10">
                        <div class="w-12 h-1.5 bg-gray-300 rounded-full group-hover:bg-blue-400 transition-colors"></div>
                    </div>

                    <div id="pane-transcript" class="flex flex-col bg-white p-5 md:p-6 shrink-0 flex-1 min-h-0 rounded-3xl shadow-sm border border-gray-200 border-l-4 border-l-blue-400 relative">
                        <div class="flex justify-between items-end mb-3 shrink-0 border-b border-gray-100 pb-2">
                            <div class="flex flex-col">
                                <span class="text-xs font-black text-blue-400 uppercase tracking-wider mb-1">Your Speech</span>
                                <span class="text-sm font-bold text-gray-600">🗣️ あなたの音声（文字起こし）</span>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="text-xs text-gray-400 font-bold mb-1">発音の正確性 (Accuracy)</span>
                                <span id="reading-accuracy" class="text-3xl font-black text-blue-600 leading-none">0%</span>
                            </div>
                        </div>
                        <div id="reading-transcript" class="flex-1 overflow-y-auto text-lg md:text-xl text-gray-400 font-bold italic leading-relaxed pt-2">
                            下の「START」ボタンを押して、英語を読んでみましょう！
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-3 md:p-4 bg-white border-t border-gray-200 flex flex-col md:flex-row justify-between items-center gap-3 shrink-0 z-10 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                <div class="flex gap-2 w-full md:w-auto justify-center md:justify-start">
                    <button id="btn-tts-rewind" class="p-3 rounded-2xl bg-gray-100 hover:bg-gray-200 text-gray-700 transition-colors shadow-sm" title="最初から再生">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"></path></svg>
                    </button>
                    <button id="btn-read-aloud" class="px-6 py-3 rounded-2xl bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold flex items-center justify-center gap-2 transition-colors shadow-sm w-36 border border-indigo-100">
                        <span id="tts-icon" class="text-xl">▶</span> <span id="tts-text">お手本</span>
                    </button>
                    <button id="btn-toggle-ja" class="px-6 py-3 rounded-2xl border border-gray-200 bg-white hover:bg-gray-50 text-gray-600 text-sm font-bold shadow-sm transition-colors">
                        🇯🇵 訳を表示
                    </button>
                </div>
                
                <div class="flex gap-3 w-full md:w-auto mt-2 md:mt-0">
                    <button id="btn-start-reading" class="flex-1 md:flex-none px-8 py-3 rounded-2xl bg-red-500 hover:bg-red-400 text-white font-black text-lg shadow-md transition-all active:scale-95 flex justify-center items-center gap-2 min-w-[200px]">
                        🎤 START
                    </button>
                    <button id="btn-next-scene" class="flex-1 md:flex-none px-8 py-3 rounded-2xl bg-blue-600 hover:bg-blue-500 text-white font-black text-lg shadow-md shadow-blue-200 transition-all active:scale-95 flex items-center justify-center gap-2 min-w-[200px]">
                        次のシーンへ ➔
                    </button>
                </div>
            </div>
        </div>

        <div id="view-retelling" class="hidden flex-col h-full w-full relative bg-gray-900 overflow-hidden">
            <div class="flex justify-between items-center p-3 bg-gray-800 shrink-0 z-10 border-b border-gray-700">
                <div id="retelling-scene-badge" class="font-bold text-gray-200 text-sm md:text-base"></div>
                <div class="flex items-center gap-3">
                    <span id="retelling-timer-text" class="text-xl md:text-2xl font-black text-pink-500 w-12 text-right tracking-tighter">20s</span>
                </div>
            </div>
            <div class="w-full h-1.5 bg-gray-700 shrink-0"><div id="retelling-timer-bar" class="h-full bg-pink-500 w-full" style="transition: width 20s linear;"></div></div>
            <div class="flex-1 relative overflow-hidden flex flex-col items-center justify-center p-4 bg-black">
                <img id="retelling-image" src="" class="max-w-full max-h-full object-contain rounded-2xl">
                <div id="retelling-recording-indicator" class="hidden absolute top-6 right-6 bg-red-500/90 text-white px-4 py-2 rounded-full text-sm font-bold animate-pulse flex items-center gap-2 shadow-lg backdrop-blur-sm"><div class="w-2.5 h-2.5 bg-white rounded-full"></div> REC</div>
            </div>
            <div class="h-1/3 md:h-1/4 bg-gray-800 p-6 shrink-0 flex flex-col border-t border-gray-700 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.3)] z-10">
                <span class="text-xs font-black text-gray-400 uppercase tracking-wider mb-2 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span> Recognized Speech</span>
                <div id="retelling-transcript-box" class="flex-1 overflow-y-auto text-lg md:text-xl text-gray-200 font-medium leading-relaxed"></div>
            </div>
            <div id="retelling-start-overlay" class="absolute inset-0 bg-gray-900/85 backdrop-blur-sm z-20 flex flex-col items-center justify-center p-6 hidden">
                <h3 class="text-3xl font-black text-white mb-2 text-center drop-shadow-md">Scene 1</h3>
                <p class="text-gray-300 text-center mb-10 font-bold text-lg">20秒間で絵の状況を英語で説明しましょう！</p>
                <button id="btn-start-retelling" class="px-10 py-5 rounded-3xl bg-pink-500 hover:bg-pink-400 text-white font-black text-2xl shadow-[0_8px_0_#be185d] active:translate-y-2 transition-all">🎤 録音スタート</button>
            </div>
            <div id="retelling-finish-overlay" class="absolute inset-0 bg-gray-900/90 backdrop-blur-md z-30 flex-col items-center justify-center p-6 hidden">
                <div class="text-6xl mb-4">🎉</div>
                <h3 class="text-3xl md:text-4xl font-black text-white mb-4 text-center">Great Job!</h3>
                <button id="btn-finish-retelling" class="px-10 py-5 rounded-3xl bg-blue-500 hover:bg-blue-400 text-white font-black text-2xl shadow-[0_8px_0_#1d4ed8] active:translate-y-2 transition-all">結果を見る ➔</button>
            </div>
            <button id="btn-next-retelling" class="hidden absolute bottom-8 right-8 z-10 px-6 py-3 rounded-xl bg-gray-600/80 hover:bg-gray-500 text-white font-bold shadow-lg backdrop-blur-sm border border-gray-500 transition-colors">SKIP ➔</button>
        </div>

        <div id="view-result-story" class="hidden flex-col h-full w-full bg-gray-50 overflow-hidden relative max-w-6xl mx-auto">
            <div class="flex justify-between items-center p-4 bg-white shadow-sm shrink-0 border-b border-gray-200">
                <h2 class="text-xl font-black text-gray-800">Retelling Result</h2>
                <button onclick="location.href='story.html'" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg transition-colors text-sm">終了する ✕</button>
            </div>
            <div id="story-ranking-container" class="flex-1 overflow-y-auto p-4 md:p-6 w-full"></div>
        </div>

    </main>

    <div id="story-mode-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full shadow-2xl transform transition-all">
            <h3 class="text-2xl font-black text-gray-800 mb-2 text-center">モード選択</h3>
            <p class="text-gray-500 text-sm font-bold text-center mb-6">学習方法を選んでください</p>
            <div class="flex flex-col gap-4">
                <button onclick="selectStoryMode('reading')" class="w-full p-4 rounded-2xl border-2 border-blue-200 bg-blue-50 hover:bg-blue-100 text-left transition-colors flex items-center gap-4 group">
                    <div class="text-4xl group-hover:scale-110 transition-transform drop-shadow-sm">📖</div>
                    <div>
                        <div class="font-black text-blue-800 text-lg">Reading Practice</div>
                        <div class="text-xs font-bold text-blue-600 mt-1 leading-relaxed">お手本を聞いて音読練習をします。<br>発音の誤りは紫色で教えてくれます。</div>
                    </div>
                </button>
                <button onclick="selectStoryMode('retelling')" class="w-full p-4 rounded-2xl border-2 border-pink-200 bg-pink-50 hover:bg-pink-100 text-left transition-colors flex items-center gap-4 group">
                    <div class="text-4xl group-hover:scale-110 transition-transform drop-shadow-sm">🗣️</div>
                    <div>
                        <div class="font-black text-pink-800 text-lg">Retelling (本番)</div>
                        <div class="text-xs font-bold text-pink-600 mt-1 leading-relaxed">1枚20秒で絵の状況を英語で説明します。<br>最後にスコアとフィードバックが出ます。</div>
                    </div>
                </button>
            </div>
            <div class="mt-6 text-center">
                <button id="btn-close-story-mode" class="text-gray-400 hover:text-gray-600 font-bold text-sm underline px-4 py-2">キャンセル</button>
            </div>
        </div>
    </div>

    <script>
        function showStoryView(viewElement) {
            ['view-select', 'view-reading', 'view-retelling', 'view-result-story'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            viewElement.classList.remove('hidden');
            if(viewElement.id === 'view-reading' || viewElement.id === 'view-retelling') {
                viewElement.classList.add('flex');
            } else {
                viewElement.classList.add('flex'); // selectやresultもflex
            }
        }
        // 初期表示
        showStoryView(document.getElementById('view-select'));
    </script>
    
    <script src="js/speech.js"></script>
    <script src="js/story_main.js"></script>
</body>
</html>
